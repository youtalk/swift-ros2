name: CI (RCL)
# RCL (native rcl) backend CI:
#   rcl-build-smoke — rmw_cyclonedds_cpp (CRos2Jazzy.xcframework): required
#     check; Mac Catalyst umbrella/smoke builds + native execution of
#     SwiftROS2RCLTests. The cost driver is cross-compiling the real ROS 2
#     stack (~20-25 min per slice), so the finished xcframework is cached on
#     the build inputs (Scripts/build-ros2-xcframework.sh + Scripts/ros2/**);
#     warm runs skip the cross-build entirely.
#   rcl-zenoh — rmw_zenoh_cpp (CRos2JazzyZenoh.xcframework): builds the zenoh
#     rmw variant (SWIFT_ROS2_RCL_RMW=zenoh — the dropZenohWire manifest
#     carve-out + SWIFT_ROS2_RCL_RMW_ZENOH define + Context routing) and
#     executes SwiftROS2RCLTests natively. Same cache strategy.
#   rcl-linux — ubuntu-24.04 + ROS 2 Jazzy: unlike the two macOS jobs above,
#     this leg consumes ROS 2 straight from apt (/opt/ros/jazzy) rather than
#     a cross-compiled xcframework — the Package.swift Linux RCL arm
#     (ROS2_RCL_PREFIX + pkg-config). Source-builds the one required message
#     package the ROS 2 apt repo doesn't ship (audio_common_msgs) into a
#     small colcon overlay layered in front of the base distro.
# SwiftROS2RCLTests only exists in the build graph when SWIFT_ROS2_ENABLE_RCL=1
# (ci.yml's swift test runs never set it), so this workflow is the only place
# those tests execute.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rcl-build-smoke:
    name: RCL build + smoke (Mac Catalyst)
    # macos-26 + Xcode 26.4.1 to match ci.yml's build-macos job (the maintained
    # macOS toolchain); the xcframework cross-build is validated on this Xcode.
    runs-on: macos-26
    timeout-minutes: 180
    env:
      SWIFT_ROS2_ENABLE_RCL: "1"
      # This job cross-builds the xcframework from HEAD — resolve it from
      # build/ros2*/ instead of the released URL+checksum artifact.
      SWIFT_ROS2_RCL_LOCAL: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          # The regen-drift guard reads the vendor IDL submodules
          # (common_interfaces-jazzy, rcl_interfaces-jazzy); the xcframework
          # build does its own `vcs import` and needs none of them.
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.4.1.app

      # Regen-drift guard: re-run the marshalling generator and assert the
      # checked-in C + Swift files are byte-identical. Pure generator (Swift
      # toolchain + vendor IDL only — no xcframework), so it runs before the
      # expensive cross-build and fails fast if the generated tree is stale.
      - name: RCL marshalling regen-drift guard
        env:
          # Clear the job-level opt-in for this step only: with it set,
          # `swift run swift-ros2-gen` would resolve the CRos2Jazzy binary
          # target at build/ros2/CRos2Jazzy.xcframework, which is not built
          # until the cross-build step below. The generator itself needs no
          # RCL target.
          SWIFT_ROS2_ENABLE_RCL: ""
        run: |
          bash Scripts/regen-rcl-marshalling.sh
          git diff --exit-code Sources/CRclBridge/Generated \
            Sources/CRclBridge/include/Generated Sources/CRclBridge/include/crcl_marshal.h \
            Sources/SwiftROS2RCL/Generated \
            || { echo "::error::generated RCL marshalling is stale — run Scripts/regen-rcl-marshalling.sh and commit"; exit 1; }

      # The finished xcframework is a deterministic function of the build
      # script (which pins the ros2 tag + package set) and Scripts/ros2/**
      # (metas, patches, toolchain, modulemap) — cache it on those inputs so
      # warm runs skip the ~40-50 min two-slice cross-build. The Xcode version
      # is spelled into the key: bumping the toolchain invalidates the cache.
      # restore/save are split so the cache is persisted right after a
      # successful cross-build, even if a later smoke step fails.
      - name: Restore CRos2Jazzy.xcframework cache (cyclonedds)
        id: cache-ros2
        uses: actions/cache/restore@v4
        with:
          path: build/ros2/CRos2Jazzy.xcframework
          key: ros2-xcfw-cyclonedds-maccatalyst-macosx-xcode26.4.1-${{ hashFiles('Scripts/build-ros2-xcframework.sh', 'Scripts/ros2/**') }}

      # Python + cmake + the ROS 2 build deps only feed the cross-build; skip
      # them entirely on a cache hit.
      - uses: actions/setup-python@v5
        if: steps.cache-ros2.outputs.cache-hit != 'true'
        with:
          python-version: "3.11"
      - if: steps.cache-ros2.outputs.cache-hit != 'true'
        run: brew install cmake

      # ament_cmake's package_xml_2_cmake.py runs under the runner's base python
      # (CMake's FindPython resolves to it, not the script's venv), so the ROS 2
      # build deps must be importable there too — install them into the runner
      # python in addition to the venv the build script creates.
      - name: Install ROS 2 build deps into runner python
        if: steps.cache-ros2.outputs.cache-hit != 'true'
        run: pip install -r Scripts/ros2/requirements.txt

      # Cross-compile rcl + rmw_cyclonedds_cpp + rosidl introspection into a
      # two-slice CRos2Jazzy.xcframework: maccatalyst for the xcodebuild
      # umbrella/smoke steps below, macosx so `swift test` can execute
      # SwiftROS2RCLTests natively at the end. Device-slice verification is
      # done on-device via Conduit, not here. (The full maccatalyst+iphoneos
      # pair is built by the separate build-ros2-xcframework.yml workflow when
      # needed.)
      - name: Build CRos2Jazzy.xcframework (maccatalyst + macosx)
        if: steps.cache-ros2.outputs.cache-hit != 'true'
        run: Scripts/build-ros2-xcframework.sh maccatalyst macosx
      - name: Save CRos2Jazzy.xcframework cache (cyclonedds)
        if: steps.cache-ros2.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/ros2/CRos2Jazzy.xcframework
          key: ros2-xcfw-cyclonedds-maccatalyst-macosx-xcode26.4.1-${{ hashFiles('Scripts/build-ros2-xcframework.sh', 'Scripts/ros2/**') }}

      # Regression guard for the umbrella build path
      # (SwiftROS2 -> SwiftROS2DDS -> CDDSBridge). This is the path the
      # CRos2Jazzy modulemap interaction broke on enableRcl Catalyst; building
      # SwiftROS2RCL / crcl-smoke alone does NOT pull CDDSBridge and would miss
      # a regression there. Must reach ** BUILD SUCCEEDED **.
      - name: Build SwiftROS2 umbrella (enableRcl, Catalyst)
        run: |
          xcodebuild -scheme SwiftROS2 \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            build CODE_SIGNING_ALLOWED=NO

      # Full test bundle: also compiles the RCL integration test and both smoke
      # executables, and confirms the native-only ros2-CLI integration tests
      # stay excluded on Mac Catalyst. Must reach ** TEST BUILD SUCCEEDED **.
      - name: Build full test bundle (enableRcl, Catalyst)
        run: |
          xcodebuild build-for-testing -scheme swift-ros2-Package \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            build CODE_SIGNING_ALLOWED=NO

      # End-to-end FFI smoke: real rcl context -> node -> Imu publisher ->
      # rcl_publish_serialized_message. Must print the OK line and exit 0.
      - name: Build + run crcl-smoke (Catalyst)
        run: |
          xcodebuild -scheme crcl-smoke \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclsmoke build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclsmoke -name crcl-smoke -type f -perm +111 | head -1)"
          echo "Running smoke: $bin"
          # crcl-smoke prints the OK line + fflush right after the publish call
          # succeeds, before DDS teardown. On a headless runner CycloneDDS
          # teardown can block on failed multicast writes, so bound the run with
          # a SIGALRM timeout and decide success on the OK line, not the
          # (possibly killed) exit code.
          out="$(perl -e 'alarm 60; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_smoke OK"

      # In-process serialization validation: SwiftROS2CDR wire bytes vs the real
      # ROS 2 introspection serializer (rmw_serialize) for every M3b type
      # (Imu/Joy/BatteryState/CompressedImage/PointCloud2), plus the RIHS01
      # type-hash check. Built under AddressSanitizer so the struct-sequence
      # (PointField[]) per-element heap-string ownership is leak/double-free
      # checked. rmw_serialize touches no DDS participant, but bound the run
      # anyway (consistent with crcl-smoke; ASan slows it, so alarm 90) and
      # decide success on the OK line + the absence of any ASan/leak report.
      - name: Build + run crcl-golden (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-golden \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclgolden -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclgolden -name crcl-golden -type f -perm +111 | head -1)"
          echo "Running golden: $bin"
          out="$(perl -e 'alarm 90; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_golden OK:"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # In-process pub/sub round-trip (M4): typed rcl_publish -> CycloneDDS
      # local delivery -> rcl_take_serialized_message -> CDRDecoder for
      # sensor_msgs/Imu, through the public createPublisher /
      # createSubscription API — the per-subscription wait-set thread and the
      # Unmanaged handler trampoline run under AddressSanitizer. The loopback
      # spins up a real DDS participant, so discovery settle + teardown can
      # block on a headless runner: bound the run (alarm 120 — 2 s settle +
      # 15 s receive deadline + ASan slowdown) and decide success on the OK
      # line + the absence of any ASan/leak report.
      - name: Build + run crcl-loopback (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-loopback \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclloopback -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclloopback -name crcl-loopback -type f -perm +111 | head -1)"
          echo "Running loopback: $bin"
          out="$(perl -e 'alarm 120; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_loopback OK:"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # In-process route-(b) non-bundled publish round-trip: an unbundled type
      # (audio_common_msgs/AudioData, absent from the marshal registry) is
      # published on the .rcl backend via RclClient's CDDSBridge raw-CDR
      # fallback below rmw, and received by a pure-Swift .dds wire subscription
      # on the same domain — proving the two CycloneDDS instances (rcl's and the
      # standalone bridge's) coexist in-process and interoperate by topic +
      # DDS-type name. Same headless-runner caveats as crcl-loopback: bound the
      # run (alarm 120 — the example's own 20 s bound + ASan slowdown) and
      # decide success on the OK line + the absence of any ASan/leak report.
      - name: Build + run crcl-nonbundled-loopback (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-nonbundled-loopback \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclnonbundledloopback -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclnonbundledloopback -name crcl-nonbundled-loopback -type f -perm +111 | head -1)"
          echo "Running nonbundled loopback: $bin"
          out="$(perl -e 'alarm 120; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_nonbundled_loopback OK"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # In-process route-(b) non-bundled SUBSCRIBE round-trip: an unbundled type
      # (audio_common_msgs/AudioData, absent from the marshal registry) is
      # subscribed on the .rcl backend via RclClient's CDDSBridge raw-CDR reader
      # fallback below rmw, and fed by a pure-Swift .dds wire publisher on the
      # same domain — the mirror of crcl-nonbundled-loopback. Same headless
      # caveats: bound the run (alarm 120) and decide success on the OK line +
      # the absence of any ASan/leak report.
      - name: Build + run crcl-nonbundled-sub-loopback (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-nonbundled-sub-loopback \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclnonbundledsubloopback -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclnonbundledsubloopback -name crcl-nonbundled-sub-loopback -type f -perm +111 | head -1)"
          echo "Running nonbundled sub loopback: $bin"
          out="$(perl -e 'alarm 120; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_nonbundled_sub_loopback OK"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # In-process service round-trip (M7): createService / createClient for
      # example_interfaces/AddTwoInts through the serialize-shim C bridge —
      # the per-entity wait threads, the request-id correlation table, and the
      # rmw_serialize / rmw_deserialize marshalling run under AddressSanitizer.
      # Two sequential calls with distinct operands gate against correlation
      # bugs, then a parameter phase (default node options, declare/get/set
      # via ROS2ParameterClient + /parameter_events) verifies the param stack.
      # Same headless-runner caveats as crcl-loopback: bound the run
      # (alarm 150 — readiness polls + service calls + param round-trip +
      # event wait + ASan slowdown) and decide success on the OK line + the
      # absence of any ASan/leak report.
      - name: Build + run crcl-svc-loopback (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-svc-loopback \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclsvcloopback -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclsvcloopback -name crcl-svc-loopback -type f -perm +111 | head -1)"
          echo "Running svc loopback: $bin"
          out="$(perl -e 'alarm 150; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_svc_loopback OK:"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # In-process action round-trip (M8): createActionServer /
      # createActionClient for example_interfaces/Fibonacci through the
      # serialize-shim C bridge — the rcl_action wait threads, the per-role
      # request correlation tables, the goal-state mirroring into rcl's state
      # machine, and the feedback / status marshalling run under
      # AddressSanitizer. Two sequential goals with distinct orders gate
      # against goal-id correlation bugs, then a mid-flight cancel asserts the
      # CANCELED terminal result. Same headless-runner caveats as the other
      # loopbacks: bound the run (alarm 150 — readiness polls + three goals +
      # cancel + ASan slowdown) and decide success on the OK line + the
      # absence of any ASan/leak report.
      - name: Build + run crcl-action-loopback (Catalyst, ASan)
        run: |
          xcodebuild -scheme crcl-action-loopback \
            -destination 'platform=macOS,variant=Mac Catalyst,arch=arm64' \
            -derivedDataPath build/dd-ci-crclactionloopback -enableAddressSanitizer YES \
            build CODE_SIGNING_ALLOWED=NO
          bin="$(find build/dd-ci-crclactionloopback -name crcl-action-loopback -type f -perm +111 | head -1)"
          echo "Running action loopback: $bin"
          out="$(perl -e 'alarm 150; exec @ARGV' "$bin" 2>&1)" || true
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -q "crcl_action_loopback OK:"
          ! printf '%s\n' "$out" | grep -qi "AddressSanitizer\|runtime error\|detected memory leaks"

      # Execute the RCL unit tests (CrossBackendBytesTests byte parity vs
      # rmw_serialize, RclDiscoveryEnvTests, RclZenohSessionEnvTests) natively
      # against the macosx slice. All hermetic: rmw_serialize touches no DDS
      # participant and the env tests never start rmw. This is the only place
      # these tests run — the target only exists under SWIFT_ROS2_ENABLE_RCL=1,
      # which ci.yml's swift test jobs never set.
      - name: Run SwiftROS2RCLTests (cyclonedds, macOS native)
        run: swift test --filter SwiftROS2RCLTests

  rcl-zenoh:
    name: RCL zenoh-rmw build + tests (macOS)
    # Covers the zenoh rmw variant, which the required check above never
    # touches: RMW_VARIANT=zenoh cross-build (rmw_zenoh_cpp no-SHM patch set,
    # fastrtps typesupport pin, zenoh-c Rust staticlib), the dropZenohWire
    # manifest carve-out (zenoh-pico wire family out of the graph — zenoh-c
    # and zenoh-pico export the same C API and cannot co-link), the
    # SWIFT_ROS2_RCL_RMW_ZENOH define, and Context's .zenoh -> rcl routing
    # (MZ1). One macosx slice is the cheapest meaningful check: `swift build`
    # compiles the whole carved-out graph natively and `swift test` executes
    # SwiftROS2RCLTests against the real rmw_zenoh xcframework.
    runs-on: macos-26
    timeout-minutes: 180
    env:
      SWIFT_ROS2_ENABLE_RCL: "1"
      SWIFT_ROS2_RCL_RMW: zenoh
      # This job cross-builds the xcframework from HEAD — resolve it from
      # build/ros2*/ instead of the released URL+checksum artifact.
      SWIFT_ROS2_RCL_LOCAL: "1"
    steps:
      # No submodules: the regen guard runs only in rcl-build-smoke, the
      # cross-build does its own clones, and the zenoh-pico vendor tree is
      # carved out of this variant's build graph anyway.
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.4.1.app

      # Same input-keyed cache strategy as rcl-build-smoke (the script embeds
      # the rmw_zenoh / zenoh-c / zenoh-cpp pins, so they are in the hash).
      - name: Restore CRos2JazzyZenoh.xcframework cache (zenoh)
        id: cache-ros2zenoh
        uses: actions/cache/restore@v4
        with:
          path: build/ros2zenoh/CRos2JazzyZenoh.xcframework
          key: ros2-xcfw-zenoh-macosx-xcode26.4.1-${{ hashFiles('Scripts/build-ros2-xcframework.sh', 'Scripts/ros2/**') }}

      - uses: actions/setup-python@v5
        if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        with:
          python-version: "3.11"
      - if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        run: brew install cmake

      # Same runner-python requirement as rcl-build-smoke: CMake's FindPython
      # resolves the base python, not the script's venv.
      - name: Install ROS 2 build deps into runner python
        if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        run: pip install -r Scripts/ros2/requirements.txt

      # build_zenohc drives cargo to build zenoh-c as a Rust staticlib and
      # runs `rustup target add` for the slice triple (aarch64-apple-darwin
      # for the macosx slice — the runner's native target, so no
      # cross-toolchain is needed). GitHub macOS images ship rustup, but
      # bootstrap it defensively in case a future image drops it.
      - name: Ensure Rust toolchain
        if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --profile minimal --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version && cargo --version

      # Cross-compile rcl + rmw_zenoh_cpp (+ prebuilt zenoh-c) into a
      # single-slice (macosx) CRos2JazzyZenoh.xcframework.
      - name: Build CRos2JazzyZenoh.xcframework (macosx)
        if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        run: RMW_VARIANT=zenoh Scripts/build-ros2-xcframework.sh macosx
      - name: Save CRos2JazzyZenoh.xcframework cache (zenoh)
        if: steps.cache-ros2zenoh.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: build/ros2zenoh/CRos2JazzyZenoh.xcframework
          key: ros2-xcfw-zenoh-macosx-xcode26.4.1-${{ hashFiles('Scripts/build-ros2-xcframework.sh', 'Scripts/ros2/**') }}

      # Whole-graph compile check of the carve-out: SwiftROS2Zenoh/CZenohPico
      # must be absent, the umbrella's .zenoh arm must route through RCL, and
      # every example/executable must still build without the wire family.
      - name: Build (zenoh rmw variant, macOS native)
        run: swift build

      # CrossBackendBytesTests runs byte parity against rmw_zenoh's fastrtps
      # typesupport serializer here (padding-normalized — Fast-CDR leaves
      # alignment padding uninitialized); RclZenohSessionEnvTests covers the
      # MZ1 router plumbing under the real zenoh-variant build graph.
      - name: Run SwiftROS2RCLTests (zenoh, macOS native)
        run: swift test --filter SwiftROS2RCLTests

  rcl-linux:
    name: RCL build + tests (Linux, ROS 2 Jazzy)
    # Unlike rcl-build-smoke / rcl-zenoh above (which cross-compile a
    # CRos2Jazzy*.xcframework via Scripts/build-ros2-xcframework.sh), this
    # job builds against a *system* ROS 2 install — /opt/ros/jazzy from the
    # ROS 2 apt repo — through the Package.swift Linux RCL arm
    # (ROS2_RCL_PREFIX + pkg-config). One required message package,
    # audio_common_msgs, is not published to the ROS 2 apt repo (confirmed
    # by the MZ5 Task 1 spike), so it is source-built here into a small
    # colcon overlay and layered in front of the base distro via the
    # colon-separated ROS2_RCL_PREFIX. point_cloud_interfaces, the other
    # marshal-registry dependency outside the ci.yml build-linux package
    # set, IS apt-available and installs straight into /opt/ros/jazzy, so it
    # needs no overlay entry.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ROS_DISTRO: jazzy
      SWIFT_ROS2_ENABLE_RCL: "1"
    steps:
      # submodules: recursive — matches ci.yml's build-linux: the Linux
      # zenoh-pico source build (CZenohPico over vendor/zenoh-pico) needs
      # the submodule checked out.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ROS 2 apt repo (keyring + sources.list idiom copied verbatim from
      # ci.yml's build-linux job) plus the RCL package closure
      # (Scripts/build-linux-rcl-deps.sh's required-libs list) plus the
      # colcon toolchain needed to source-build the audio_common_msgs
      # overlay below. ros-jazzy-audio-common-msgs is intentionally absent
      # from this list — it does not exist in the ROS 2 apt repo.
      - name: Install ROS 2 Jazzy (rcl + both rmw + message packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config curl gnupg lsb-release software-properties-common
          sudo mkdir -p /usr/share/keyrings
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            | sudo tee /usr/share/keyrings/ros-archive-keyring.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y \
            ros-jazzy-rcl ros-jazzy-rcl-action \
            ros-jazzy-rmw-zenoh-cpp ros-jazzy-rmw-cyclonedds-cpp \
            ros-jazzy-rosidl-typesupport-introspection-c \
            ros-jazzy-sensor-msgs ros-jazzy-geometry-msgs ros-jazzy-std-msgs \
            ros-jazzy-std-srvs ros-jazzy-example-interfaces ros-jazzy-tf2-msgs \
            ros-jazzy-point-cloud-interfaces \
            python3-colcon-common-extensions python3-empy ros-jazzy-rosidl-default-generators git

      # Pinned to the exact tarball ci.yml's build-linux job uses for
      # (jazzy, ubuntu-24.04, x86_64) — do not invent a different version.
      - name: Install Swift 6.3.1
        run: |
          curl -sSL "https://download.swift.org/swift-6.3.1-release/ubuntu2404/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE-ubuntu24.04.tar.gz" \
            -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar -xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"
      - name: Swift version
        run: swift --version

      # audio_common_msgs source build, proven on the MZ5 Task 1 spike host.
      # Overlay lands at $HOME/ros2_overlay/install. Every other package in
      # the audio_common repo is COLCON_IGNOREd so colcon only builds the
      # one message package this job needs; pinned to a known-good commit
      # rather than tracking the ros2 branch tip.
      - name: Build audio_common_msgs overlay
        run: |
          source /opt/ros/jazzy/setup.bash
          # colcon's rosidl generation imports `em` from the system
          # dist-packages, not colcon's own venv — without this on
          # PYTHONPATH, colcon build fails with
          # "ModuleNotFoundError: No module named 'em'".
          export PYTHONPATH="/usr/lib/python3/dist-packages:${PYTHONPATH:-}"
          mkdir -p "$HOME/ros2_overlay/src"
          git clone --branch ros2 --single-branch https://github.com/ros-drivers/audio_common.git "$HOME/ros2_overlay/src/audio_common"
          git -C "$HOME/ros2_overlay/src/audio_common" checkout db2770b0ad703c474039914937974c764dc94351
          for p in "$HOME"/ros2_overlay/src/audio_common/*/; do
            [ -f "${p}package.xml" ] || continue
            [ "$(basename "$p")" = audio_common_msgs ] && continue
            touch "${p}COLCON_IGNORE"
          done
          cd "$HOME/ros2_overlay"
          colcon build --merge-install --packages-select audio_common_msgs --cmake-args -DCMAKE_BUILD_TYPE=Release

      # ROS2_RCL_PREFIX is a colon-separated ament-prefix list, overlay
      # first (mirrors ament's own setup.bash chaining order) — see
      # Scripts/build-linux-rcl-deps.sh. Set on this step and the build /
      # test steps below; the deps-verify script itself sources no
      # setup.bash and emits no compiler flags, it only checks the prefixes.
      - name: Verify ROS 2 RCL deps
        run: |
          source /opt/ros/jazzy/setup.bash
          export ROS2_RCL_PREFIX="$HOME/ros2_overlay/install:/opt/ros/jazzy"
          bash Scripts/build-linux-rcl-deps.sh
      - name: Build (Linux RCL)
        run: |
          source /opt/ros/jazzy/setup.bash
          export ROS2_RCL_PREFIX="$HOME/ros2_overlay/install:/opt/ros/jazzy"
          export PKG_CONFIG_PATH="/opt/ros/jazzy/lib/$(uname -m)-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          swift build
      - name: Run SwiftROS2RCLTests (Linux)
        run: |
          source /opt/ros/jazzy/setup.bash
          # Layer the overlay's own setup.bash on top so audio_common_msgs's
          # shared libraries resolve on the runtime loader path too, not
          # just at link time.
          source "$HOME/ros2_overlay/install/setup.bash"
          export ROS2_RCL_PREFIX="$HOME/ros2_overlay/install:/opt/ros/jazzy"
          export PKG_CONFIG_PATH="/opt/ros/jazzy/lib/$(uname -m)-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          # SwiftROS2BenchTests rides along: the RESULT-line stack stamp is
          # build-arm-dependent and its Linux-RCL branch only exists here.
          swift test --filter 'SwiftROS2RCLTests|SwiftROS2BenchTests'
