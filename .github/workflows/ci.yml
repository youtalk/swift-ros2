name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-format:
    name: swift-format lint
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: swift-format version
        run: swift-format --version
      - name: Lint
        run: swift format lint --recursive --strict --configuration .swift-format Package.swift Sources Tests

  build-macos:
    name: Build & Test (macOS)
    needs: [swift-format]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel

  build-linux:
    name: Build & Test (Ubuntu ${{ matrix.ubuntu_version }} ${{ matrix.arch }} + ROS 2 ${{ matrix.ros_distro }})
    needs: [swift-format]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            ubuntu_version: "22.04"
            arch: x86_64
            runner: ubuntu-22.04
            swift_platform_path: ubuntu2204
            swift_tarball_suffix: ubuntu22.04
          - ros_distro: humble
            ubuntu_version: "22.04"
            arch: aarch64
            runner: ubuntu-22.04-arm
            swift_platform_path: ubuntu2204-aarch64
            swift_tarball_suffix: ubuntu22.04-aarch64
          - ros_distro: jazzy
            ubuntu_version: "24.04"
            arch: x86_64
            runner: ubuntu-24.04
            swift_platform_path: ubuntu2404
            swift_tarball_suffix: ubuntu24.04
          - ros_distro: jazzy
            ubuntu_version: "24.04"
            arch: aarch64
            runner: ubuntu-24.04-arm
            swift_platform_path: ubuntu2404-aarch64
            swift_tarball_suffix: ubuntu24.04-aarch64
          - ros_distro: rolling
            ubuntu_version: "24.04"
            arch: x86_64
            runner: ubuntu-24.04
            swift_platform_path: ubuntu2404
            swift_tarball_suffix: ubuntu24.04
          - ros_distro: rolling
            ubuntu_version: "24.04"
            arch: aarch64
            runner: ubuntu-24.04-arm
            swift_platform_path: ubuntu2404-aarch64
            swift_tarball_suffix: ubuntu24.04-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config curl gnupg lsb-release software-properties-common
      - name: Install ROS 2 ${{ matrix.ros_distro }} CycloneDDS
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            | sudo tee /usr/share/keyrings/ros-archive-keyring.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y ros-${{ matrix.ros_distro }}-cyclonedds
      - name: Install Swift 6.0.2
        run: |
          curl -sSL "https://download.swift.org/swift-6.0.2-release/${{ matrix.swift_platform_path }}/swift-6.0.2-RELEASE/swift-6.0.2-RELEASE-${{ matrix.swift_tarball_suffix }}.tar.gz" \
            -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar -xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"
      - name: Swift version
        run: swift --version
      - name: Verify Linux deps
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          export PKG_CONFIG_PATH="/opt/ros/${{ matrix.ros_distro }}/lib/${{ matrix.arch }}-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          bash Scripts/build-linux-deps.sh
      - name: Build
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          export PKG_CONFIG_PATH="/opt/ros/${{ matrix.ros_distro }}/lib/${{ matrix.arch }}-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          swift build
      - name: Test
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          export PKG_CONFIG_PATH="/opt/ros/${{ matrix.ros_distro }}/lib/${{ matrix.arch }}-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}"
          swift test --parallel

  build-windows:
    name: Build & Test (Windows x86_64, Zenoh only)
    needs: [swift-format]
    runs-on: windows-latest
    # Pin Swift 6.3.1 here (not 6.0.2 like macOS + Linux) because 6.0.2's
    # Windows SDK shim assumes older Windows Kits headers than the current
    # windows-latest runner image ships — it fails with "could not build
    # module 'ucrt'". 6.3.1 bundles up-to-date shims and works out of the
    # box. The rest of the matrix stays on 6.0.2: macOS is pinned to
    # Xcode 16.2 (Swift 6.0.x) and Linux downloads 6.0.2 directly.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: compnerd/gha-setup-swift@eeda069c5bc95ac8a9ac5cea7d4f588ae5420ca5 # v0.4.0
        with:
          branch: swift-6.3.1-release
          tag: 6.3.1-RELEASE
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel

  build-android:
    name: Build Android (${{ matrix.abi }})
    needs: [swift-format]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            triple: aarch64-unknown-linux-android28
          - abi: x86_64
            triple: x86_64-unknown-linux-android28
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # Swift 6.3.1 — matches the Android SDK below. compnerd/gha-setup-swift
      # silently installs Swift 6.3 on Linux regardless of `tag:`, which
      # mismatches the SDK's prebuilt swiftmodules (\"module compiled
      # with Swift 6.3.1 cannot be imported by the Swift 6.3 compiler\").
      # Download directly from swift.org instead, same pattern as
      # build-linux above.
      - name: Install Swift 6.3.1
        run: |
          curl -fsSL "https://download.swift.org/swift-6.3.1-release/ubuntu2404/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE-ubuntu24.04.tar.gz" \
            -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar -xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"
      # The Swift Android SDK artifact bundle does not ship its own
      # ndk-sysroot — it ships a setup-android-sdk.sh script that
      # hydrates ndk-sysroot from a locally installed NDK in-place.
      # Without running it, clang can't find <sys/time.h> / <string.h>
      # under the SDK's --sysroot. The script requires NDK >= r27.
      - name: Install Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false
      - name: Install Swift Android SDK
        env:
          # Pinned via repository variables so values can be rotated
          # without a code change. Set both at
          # github.com/youtalk/swift-ros2/settings/variables/actions:
          #   SWIFT_ANDROID_SDK_URL      — full https URL of the
          #                                .artifactbundle from
          #                                swift.org/install/android
          #   SWIFT_ANDROID_SDK_CHECKSUM — SHA-256 hex string from the
          #                                same page
          # If either is unset, this step fails fast with an actionable
          # message instead of leaving the swift sdk install command to
          # surface a less-clear error.
          SDK_URL: ${{ vars.SWIFT_ANDROID_SDK_URL }}
          SDK_CHECKSUM: ${{ vars.SWIFT_ANDROID_SDK_CHECKSUM }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if [[ -z "$SDK_URL" || -z "$SDK_CHECKSUM" ]]; then
            echo "ERROR: repository variables SWIFT_ANDROID_SDK_URL and SWIFT_ANDROID_SDK_CHECKSUM must both be set." >&2
            echo "       Configure them at https://github.com/youtalk/swift-ros2/settings/variables/actions." >&2
            exit 1
          fi
          swift sdk install "$SDK_URL" --checksum "$SDK_CHECKSUM"
          # Hydrate the SDK's ndk-sysroot by symlinking $ANDROID_NDK_HOME
          # into the installed bundle, using the SDK's bundled helper.
          SDK_BUNDLE=$(find ~/.config/swiftpm/swift-sdks -maxdepth 1 -type d -name '*android*.artifactbundle' | head -1)
          if [[ -z "$SDK_BUNDLE" ]]; then
            echo "ERROR: installed Swift Android SDK bundle not found under ~/.config/swiftpm/swift-sdks" >&2
            exit 1
          fi
          bash "$SDK_BUNDLE/swift-android/scripts/setup-android-sdk.sh"
          swift sdk list
      - name: Swift version
        run: swift --version
      - name: Build
        # SWIFT_ROS2_TARGET_OS — Package.swift reads this to pick the
        # Android arm when cross-compiling from a Linux host, since
        # `#if os(Android)` at manifest scope reflects the host.
        env:
          SWIFT_ROS2_TARGET_OS: android
        run: swift build --swift-sdk ${{ matrix.triple }} -v

  test-android-x86_64:
    name: Test Android (x86_64 emulator)
    # Decoupled from build-android: this job rebuilds the x86_64 tests
    # itself and does not consume artifacts from the matrix, so an
    # arm64 build failure should not block the emulator signal.
    needs: [swift-format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Swift 6.3.1
        run: |
          curl -fsSL "https://download.swift.org/swift-6.3.1-release/ubuntu2404/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE-ubuntu24.04.tar.gz" \
            -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar -xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"
      - name: Install Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false
      - name: Install Swift Android SDK
        env:
          SDK_URL: ${{ vars.SWIFT_ANDROID_SDK_URL }}
          SDK_CHECKSUM: ${{ vars.SWIFT_ANDROID_SDK_CHECKSUM }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          if [[ -z "$SDK_URL" || -z "$SDK_CHECKSUM" ]]; then
            echo "ERROR: repository variables SWIFT_ANDROID_SDK_URL and SWIFT_ANDROID_SDK_CHECKSUM must both be set." >&2
            exit 1
          fi
          swift sdk install "$SDK_URL" --checksum "$SDK_CHECKSUM"
          SDK_BUNDLE=$(find ~/.config/swiftpm/swift-sdks -maxdepth 1 -type d -name '*android*.artifactbundle' | head -1)
          if [[ -z "$SDK_BUNDLE" ]]; then
            echo "ERROR: installed Swift Android SDK bundle not found under ~/.config/swiftpm/swift-sdks" >&2
            exit 1
          fi
          bash "$SDK_BUNDLE/swift-android/scripts/setup-android-sdk.sh"
      - name: Build tests for Android x86_64
        env:
          SWIFT_ROS2_TARGET_OS: android
        run: swift build --build-tests --swift-sdk x86_64-unknown-linux-android28 -v
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run tests on Android x86_64 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash Scripts/run-android-tests.sh
