name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-format:
    name: swift-format lint
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    steps:
      - uses: actions/checkout@v4
      - name: swift-format version
        run: swift-format --version
      - name: Lint
        run: swift format lint --recursive --strict --configuration .swift-format Package.swift Sources Tests

  build-macos:
    name: Build & Test (macOS)
    needs: [swift-format]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel

  build-linux:
    name: Build & Test (Linux ${{ matrix.runner }})
    needs: [swift-format]
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            container: swift:6.2-jammy
          - runner: ubuntu-24.04
            container: swift:6.2-noble
          - runner: ubuntu-22.04-arm
            container: swift:6.2-jammy
    steps:
      - name: Install host deps
        run: apt-get update -qq && apt-get install -y -qq git ca-certificates
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel

  build-windows:
    name: Build & Test (Windows x86_64, Zenoh only)
    needs: [swift-format]
    runs-on: windows-latest
    # Pin Swift 6.3.1 here (not 6.0.2 like macOS) because 6.0.2's Windows
    # SDK shim assumes older Windows Kits headers than the current
    # windows-latest runner image ships — it fails with "could not build
    # module 'ucrt'". 6.3.1 bundles up-to-date shims and works out of the
    # box. macOS stays on Xcode 16.2 (Swift 6.0.x); Linux uses swift:6.2
    # containers (required for .artifactbundle staticLibrary support).
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: compnerd/gha-setup-swift@eeda069c5bc95ac8a9ac5cea7d4f588ae5420ca5 # v0.4.0
        with:
          branch: swift-6.3.1-release
          tag: 6.3.1-RELEASE
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel
