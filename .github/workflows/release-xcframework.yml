name: Release xcframeworks

on:
  push:
    tags:
      # Bare-semver tags (Apple-style): 1.2.3, 1.2.3-beta1, etc.
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts to"
        required: true

concurrency:
  group: release-xcframework-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apple:
    name: Build ${{ matrix.framework }}.xcframework
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        framework:
          - zenoh-pico
          - cyclonedds
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"
      - name: Install CMake
        run: |
          brew update
          brew install cmake
      - name: Build xcframework
        run: Scripts/build-xcframework.sh ${{ matrix.framework }} artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.framework }}-xcframework
          path: |
            artifacts/*.zip
            artifacts/*.checksum
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build ${{ matrix.framework }}.artifactbundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ubuntu:22.04
    strategy:
      fail-fast: false
      matrix:
        framework:
          - zenoh-pico
          - cyclonedds
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - arch: aarch64
            runner: ubuntu-22.04-arm
            triple: aarch64-unknown-linux-gnu
    steps:
      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq git cmake build-essential ca-certificates
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build staging
        run: Scripts/build-linux-artifactbundle.sh ${{ matrix.framework }} ${{ matrix.triple }} staging
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.framework }}-${{ matrix.arch }}-linux-staging
          path: staging/
          if-no-files-found: error
          retention-days: 7

  merge-linux:
    name: Merge ${{ matrix.framework }} linux artifactbundle
    needs: build-linux
    runs-on: ubuntu-24.04
    container: swift:6.2-jammy
    strategy:
      fail-fast: false
      matrix:
        framework:
          - zenoh-pico
          - cyclonedds
    steps:
      - name: Install deps
        run: apt-get update -qq && apt-get install -y -qq zip git ca-certificates
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.framework }}-*-linux-staging
          path: staging-downloads/
      - name: Flatten staging
        run: |
          mkdir -p staging
          for d in staging-downloads/${{ matrix.framework }}-*-linux-staging/*/; do
            triple=$(basename "$d")
            cp -r "$d" "staging/$triple"
          done
          ls staging/
      - name: Merge into artifactbundle
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: SWIFT_ROS2_VERSION="${TAG#v}" Scripts/merge-linux-artifactbundle.sh ${{ matrix.framework }} staging artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.framework }}-linux
          path: |
            artifacts/*.zip
            artifacts/*.checksum
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Attach to release
    needs: [build-apple, build-linux, merge-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find artifacts -type f \( -name "*.zip" -o -name "*.checksum" \) -exec cp {} upload/ \;
          ls -la upload
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" --repo "${{ github.repository }}" || \
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "$TAG" --generate-notes --verify-tag
          gh release upload "$TAG" --repo "${{ github.repository }}" --clobber \
            upload/CZenohPico.xcframework.zip \
            upload/CZenohPico.xcframework.zip.checksum \
            upload/CCycloneDDS.xcframework.zip \
            upload/CCycloneDDS.xcframework.zip.checksum \
            upload/CZenohPico-linux.artifactbundle.zip \
            upload/CZenohPico-linux.artifactbundle.zip.checksum \
            upload/CCycloneDDS-linux.artifactbundle.zip \
            upload/CCycloneDDS-linux.artifactbundle.zip.checksum
